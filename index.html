<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinels Cup 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #2e7d32;
            --primary-hover: #1b5e20;
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --accent-lock: #d32f2f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            width: 100%;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        h2 {
            margin-bottom: 20px;
            color: var(--primary-color);
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"], input[type="email"], input[type="password"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .switch-mode {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .switch-mode span {
            color: var(--primary-color);
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }

        .match-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 5px solid var(--primary-color);
        }

        .match-card.locked {
            border-left-color: var(--accent-lock);
            background-color: #fdf2f2;
        }

        .match-info {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .team {
            flex: 1;
            font-weight: bold;
            font-size: 16px;
        }

        .team.home { text-align: right; margin-right: 15px; }
        .team.away { text-align: left; margin-left: 15px; }

        .inputs {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .inputs input {
            width: 50px;
            text-align: center;
            padding: 8px;
        }

        .lock-badge {
            color: var(--accent-lock);
            font-weight: bold;
            font-size: 12px;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .nav-bar button {
            margin: 0;
            width: auto;
            padding: 8px 15px;
            background: transparent;
            color: var(--text-main);
            font-weight: normal;
        }

        .nav-bar button.active {
            background: var(--primary-color);
            color: white;
            font-weight: bold;
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .ranking-table th, .ranking-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eeeeee;
        }

        .ranking-table th {
            background-color: #f8f9fa;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <header>⚽ SENTINELS CUP 2026</header>

    <div class="container">
        
        <div id="auth-card" class="card">
            <h2 id="auth-title">Identifikohuni</h2>
            
            <div id="register-fields" class="hidden">
                <div class="form-group">
                    <label>Emri i Plotë</label>
                    <input type="text" id="user-fullname" placeholder="Filan Fisteku">
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="user-email" placeholder="emri@gmail.com">
            </div>

            <div class="form-group">
                <label>Fjalëkalimi</label>
                <input type="password" id="user-password" placeholder="••••••••">
            </div>

            <button id="auth-btn">Hyni</button>

            <div class="switch-mode" id="switch-auth-mode">
                Nuk keni një llogari? <span id="toggle-auth">Regjistrohuni</span>
            </div>
        </div>

        <div id="main-app" class="hidden">
            
            <div class="nav-bar">
                <button id="nav-matches" class="active" onclick="switchTab('matches')">Ndeshjet</button>
                <button id="nav-ranking" onclick="switchTab('ranking')">Renditja</button>
                <button id="logout-btn" style="color: var(--accent-lock);">Dil</button>
            </div>

            <div id="tab-matches">
                <h2>Parashikimet e Mia</h2>
                <div id="matches-list">
                    </div>
            </div>

            <div id="tab-ranking" class="hidden">
                <h2>Tabela e Renditjes</h2>
                <table class="ranking-table">
                    <thead>
                        <tr>
                            <th>Poz.</th>
                            <th>Lojtari</th>
                            <th>Pikët</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-list">
                        </tbody>
                </table>
            </div>

        </div>

    </div>

    <script>
        // Shënim: Funksionon në modalitetin Demo lokal ose lidhet me Supabase nëse shtohen variablat
        const SUPABASE_URL = '___SUPABASE_URL_PLACEHOLDER___';
        const SUPABASE_KEY = '___SUPABASE_KEY_PLACEHOLDER___';

        let supabase = null;
        if (SUPABASE_URL && SUPABASE_KEY && !SUPABASE_URL.includes('PLACEHOLDER')) {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        let isLoginMode = true;
        let currentUser = null;

        const matchesData = [
            { id: 1, home: "Shqipëria", away: "Italia", time: "2026-06-10T20:00:00Z" },
            { id: 2, home: "Gjermania", away: "Spanja", time: "2026-06-11T18:00:00Z" },
            { id: 3, home: "Brazili", away: "Argjentina", time: "2026-06-15T21:00:00Z" }
        ];

        // Funksioni i rregulluar për ndryshimin e modalitetit
        function setupToggle() {
            const toggleBtn = document.getElementById('toggle-auth');
            if (toggleBtn) {
                toggleBtn.onclick = function() {
                    isLoginMode = !isLoginMode;
                    document.getElementById('auth-title').innerText = isLoginMode ? "Identifikohuni" : "Krijo llogari të re";
                    document.getElementById('register-fields').classList.toggle('hidden', isLoginMode);
                    document.getElementById('auth-btn').innerText = isLoginMode ? "Hyni" : "Regjistrohuni";
                    
                    const switchContainer = document.getElementById('switch-auth-mode');
                    if (isLoginMode) {
                        switchContainer.innerHTML = 'Nuk keni një llogari? <span id="toggle-auth">Regjistrohuni</span>';
                    } else {
                        switchContainer.innerHTML = 'Keni një llogari? <span id="toggle-auth">Identifikohuni</span>';
                    }
                    setupToggle(); // Rilidh funksionin tek elementi i ri
                };
            }
        }
        
        // Nisja fillon këtu
        setupToggle();

        // Butoni i Autentikimit
        document.getElementById('auth-btn').addEventListener('click', async () => {
            const email = document.getElementById('user-email').value;
            const password = document.getElementById('user-password').value;
            const fullname = document.getElementById('user-fullname').value;

            if (!email || !password) {
                alert("Ju lutem plotësoni të gjitha fushat!");
                return;
            }

            if (!supabase) {
                currentUser = { email: email, name: fullname || email.split('@')[0] };
                showDashboard();
                return;
            }

            try {
                if (isLoginMode) {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    currentUser = data.user;
                } else {
                    const { data, error } = await supabase.auth.signUp({
                        email, password,
                        options: { data: { full_name: fullname } }
                    });
                    if (error) throw error;
                    currentUser = data.user;
                    alert("Regjistrimi u krye! Mund të hyni në aplikacion.");
                }
                showDashboard();
            } catch (err) {
                alert("Gabim: " + err.message);
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            currentUser = null;
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('auth-card').classList.remove('hidden');
        });

        function showDashboard() {
            document.getElementById('auth-card').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            renderMatches();
            renderRanking();
        }

        function switchTab(tab) {
            document.getElementById('tab-matches').classList.toggle('hidden', tab !== 'matches');
            document.getElementById('tab-ranking').classList.toggle('hidden', tab !== 'ranking');
            document.getElementById('nav-matches').classList.toggle('active', tab === 'matches');
            document.getElementById('nav-ranking').classList.toggle('active', tab === 'ranking');
        }

        function checkIsLocked(matchTimeStr) {
            const matchTime = new Date(matchTimeStr);
            const now = new Date();
            const hoursDifference = (matchTime - now) / (1000 * 60 * 60);
            return hoursDifference <= 48;
        }

        function renderMatches() {
            const container = document.getElementById('matches-list');
            container.innerHTML = '';

            matchesData.forEach(match => {
                const isLocked = checkIsLocked(match.time);
                const matchDate = new Date(match.time).toLocaleString('sq-AL', { timeZone: 'Europe/Tirane' });

                const matchHtml = `
                    <div class="match-card ${isLocked ? 'locked' : ''}">
                        <div class="match-info">
                            <span>📅 ${matchDate}</span>
                            ${isLocked ? '<span class="lock-badge">🔒 E bllokuar (48h)</span>' : '<span style="color:green;">🔓 E hapur</span>'}
                        </div>
                        <div class="match-teams">
                            <div class="team home">${match.home}</div>
                            <div class="inputs">
                                <input type="number" min="0" id="match-${match.id}-home" ${isLocked ? 'disabled' : ''} placeholder="-">
                                <span>:</span>
                                <input type="number" min="0" id="match-${match.id}-away" ${isLocked ? 'disabled' : ''} placeholder="-">
                            </div>
                            <div class="team away">${match.away}</div>
                        </div>
                        ${!isLocked ? `<button onclick="savePrediction(${match.id})" style="margin-top:10px; padding:6px; font-size:12px;">Ruaj Parashikimin</button>` : ''}
                    </div>
                `;
                container.innerHTML += matchHtml;
            });
        }

        function savePrediction(matchId) {
            const homeScore = document.getElementById(`match-${matchId}-home`).value;
            const awayScore = document.getElementById(`match-${matchId}-away`).value;

            if (homeScore === '' || awayScore === '') {
                alert("Ju lutem vendosni rezultatin!");
                return;
            }
            alert(`U ruajt: ${homeScore} - ${awayScore}`);
        }

        function renderRanking() {
            const tbody = document.getElementById('ranking-list');
            tbody.innerHTML = `
                <tr><td>1</td><td><b>${currentUser ? (currentUser.name || currentUser.email.split('@')[0]) : 'Lojtari'}</b></td><td>0 pikë</td></tr>
                <tr><td>2</td><td>Olsi Hana</td><td>0 pikë</td></tr>
            `;
        }
    </script>
</body>
</html>

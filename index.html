<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinels Cup 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #2e7d32;
            --primary-hover: #1b5e20;
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --accent-lock: #d32f2f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            width: 100%;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        h2 {
            margin-bottom: 20px;
            color: var(--primary-color);
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"], input[type="email"], input[type="password"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .switch-mode {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .switch-mode a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        .hidden {
            display: none !important;
        }

        .match-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 5px solid var(--primary-color);
        }

        .match-card.locked {
            border-left-color: var(--accent-lock);
            background-color: #fdf2f2;
        }

        .match-info {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .team {
            flex: 1;
            font-weight: bold;
            font-size: 16px;
        }

        .team.home { text-align: right; margin-right: 15px; }
        .team.away { text-align: left; margin-left: 15px; }

        .inputs {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .inputs input {
            width: 50px;
            text-align: center;
            padding: 8px;
        }

        .lock-badge {
            color: var(--accent-lock);
            font-weight: bold;
            font-size: 12px;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .nav-bar button {
            margin: 0;
            width: auto;
            padding: 8px 15px;
            background: transparent;
            color: var(--text-main);
            font-weight: normal;
        }

        .nav-bar button.active {
            background: var(--primary-color);
            color: white;
            font-weight: bold;
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .ranking-table th, .ranking-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eeeeee;
        }

        .ranking-table th {
            background-color: #f8f9fa;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <header>⚽ SENTINELS CUP 2026</header>

    <div class="container">
        
        <div id="auth-card" class="card">
            <h2 id="auth-title">Identifikohuni</h2>
            
            <div id="register-fields" class="hidden">
                <div class="form-group">
                    <label>Emri i Plotë</label>
                    <input type="text" id="user-fullname" placeholder="Filan Fisteku">
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="user-email" placeholder="emri@gmail.com">
            </div>

            <div class="form-group">
                <label>Fjalëkalimi</label>
                <input type="password" id="user-password" placeholder="••••••••">
            </div>

            <button id="auth-btn">Hyni</button>

            <div class="switch-mode" id="switch-auth-mode">
                Nuk keni një llogari? <a href="#" id="toggle-auth">Regjistrohuni</a>
            </div>
        </div>

        <div id="main-app" class="hidden">
            
            <div class="nav-bar">
                <button id="nav-matches" class="active" onclick="switchTab('matches')">Ndeshjet</button>
                <button id="nav-ranking" onclick="switchTab('ranking')">Renditja</button>
                <button id="logout-btn" style="color: var(--accent-lock);">Dil</button>
            </div>

            <div id="tab-matches">
                <h2>Parashikimet e Mia</h2>
                <div id="matches-list">
                    </div>
            </div>

            <div id="tab-ranking" class="hidden">
                <h2>Tabela e Renditjes</h2>
                <table class="ranking-table">
                    <thead>
                        <tr>
                            <th>Poz.</th>
                            <th>Lojtari</th>
                            <th>Pikët</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-list">
                        </tbody>
                </table>
            </div>

        </div>

    </div>
